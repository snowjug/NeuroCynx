    <script type="text/babel">

        const generateWithGeminiFallback = async ({ parts, responseMimeType }) => {
            const response = await fetch('/api/gemini/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ parts, responseMimeType })
            });

            const contentType = response.headers.get('content-type') || '';
            const rawBody = await response.text();

            let result;
            if (contentType.includes('application/json')) {
                try {
                    result = JSON.parse(rawBody);
                } catch (_error) {
                    throw new Error('AI_UNAVAILABLE');
                }
            } else {
                throw new Error('AI_UNAVAILABLE');
            }

            if (response.ok) {
                return result;
            }

            const errorCode = result?.error?.code || '';
            const errorMessage = result?.error?.message || 'AI Error';

            if (errorCode === 'SERVICE_UNAVAILABLE') {
                throw new Error('AI_UNAVAILABLE');
            }

            if (errorCode === 'QUOTA_EXCEEDED' || /quota|429/i.test(errorMessage)) {
                throw new Error('QUOTA_EXCEEDED');
            }

            throw new Error(errorMessage);
        };

        const NeuralBackground = ({ type = 'network' }) => {
            const canvasRef = useRef(null);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                const parent = canvas.parentElement;
                const ctx = canvas.getContext('2d');
                let width, height;
                let particles = [];
                
                const resize = () => {
                    width = canvas.width = parent.clientWidth;
                    height = canvas.height = parent.clientHeight;
                };
                
                const createParticles = () => {
                    particles = [];
                    // Adjust particle count based on area size
                    const area = width * height;
                    const count = Math.floor(area / 15000); 
                    
                    for (let i = 0; i < count; i++) {
                        particles.push({
                            x: Math.random() * width,
                            y: Math.random() * height,
                            vx: (Math.random() - 0.5) * (type === 'molecular' ? 0.3 : 0.5),
                            vy: (Math.random() - 0.5) * (type === 'molecular' ? 0.3 : 0.5),
                            radius: type === 'molecular' ? Math.random() * 3 + 2 : Math.random() * 2 + 1
                        });
                    }
                };

                const draw = () => {
                    ctx.clearRect(0, 0, width, height);
                    const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
                    
                    // Update and draw particles
                    particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        
                        // Bounce off edges
                        if (p.x < 0 || p.x > width) p.vx *= -1;
                        if (p.y < 0 || p.y > height) p.vy *= -1;
                        
                        ctx.beginPath();
                        if (type === 'molecular') {
                            ctx.rect(p.x - p.radius, p.y - p.radius, p.radius * 2, p.radius * 2);
                        } else {
                            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        }
                        ctx.fillStyle = accentColor;
                        ctx.globalAlpha = type === 'molecular' ? 0.2 : 0.4;
                        ctx.fill();
                    });
                    
                    // Draw connections
                    particles.forEach((p1, i) => {
                        particles.slice(i + 1).forEach(p2 => {
                            const dx = p1.x - p2.x;
                            const dy = p1.y - p2.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const maxDist = type === 'molecular' ? 200 : 150;
                            
                            if (dist < maxDist) {
                                ctx.beginPath();
                                ctx.moveTo(p1.x, p1.y);
                                ctx.lineTo(p2.x, p2.y);
                                ctx.strokeStyle = accentColor;
                                ctx.globalAlpha = (1 - dist / maxDist) * (type === 'molecular' ? 0.3 : 1);
                                ctx.lineWidth = type === 'molecular' ? 0.8 : 0.5;
                                ctx.stroke();
                            }
                        });
                    });
                    
                    requestAnimationFrame(draw);
                };

                window.addEventListener('resize', () => { resize(); createParticles(); });
                resize();
                createParticles();
                draw();
                
                return () => window.removeEventListener('resize', resize);
            }, [type]);

            return <canvas ref={canvasRef} style={{position: 'absolute', top: 0, left: 0, zIndex: -1, width: '100%', height: '100%', opacity: 0.5}} />;
        };

        const Chatbot = ({ contextData }) => {
            const [messages, setMessages] = useState([{ role: 'ai', text: 'Hello! I am your NeuCyn AI assistant. Do you have any questions about your report?' }]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                // Only scroll if we have more than the initial greeting, or if it's a user interaction
                if (messages.length > 1) {
                    scrollToBottom();
                }
            }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;
                const userMsg = input;
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setInput('');
                setIsTyping(true);

                try {
                    const prompt = `
                        You are a helpful medical AI assistant. The user just received this medical report summary:
                        "${contextData.summary}"
                        
                        User asks: "${userMsg}"
                        
                        Provide a concise, empathetic, and professional answer. Remind them to consult a real doctor if it's a serious medical question.
                    `;

                    const result = await generateWithGeminiFallback({
                        parts: [{ text: prompt }]
                    });
                    
                    const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "I apologize, but I couldn't generate a response based on that query.";
                    setMessages(prev => [...prev, { role: 'ai', text: aiText }]);
                } catch (error) {
                    if (error.message === "AI_UNAVAILABLE") {
                        setMessages(prev => [...prev, { role: 'ai', text: "Live AI assistant is temporarily unavailable. Please contact support for help with this report." }]);
                    } else
                    if (error.message === "QUOTA_EXCEEDED" || error.message.includes("quota")) {
                         setMessages(prev => [...prev, { role: 'ai', text: "(Demo Mode) I am currently unable to access the live AI model due to usage limits. However, generally speaking, consulting a specialist is always recommended for specific symptoms." }]);
                    } else {
                         setMessages(prev => [...prev, { role: 'ai', text: "Sorry, I'm having trouble connecting right now. Please try again later." }]);
                    }
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="chatbot-container fade-up">
                    <div className="chat-header">
                        <ion-icon name="chatbubbles-outline" style={{fontSize: '24px'}}></ion-icon>
                        <span>Follow-up Assistant</span>

                    <div className="chat-messages">
                        {messages.map((msg, i) => (
                            <div key={i} className={`chat-msg ${msg.role}`}>
                                {msg.text}
                            </div>
                        ))}
                        {isTyping && (
                            <div className="chat-msg ai">
                                <div className="spinner" style={{width: '20px', height: '20px', borderWidth: '2px'}}></div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>
                    <div className="chat-input-area">
                        <input 
                            type="text" 
                            placeholder="Ask about your report..." 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                        />
                        <button onClick={handleSend} disabled={isTyping}>
                            <ion-icon name="send-outline"></ion-icon>
                        </button>
                    </div>
                </div>
            );
        };

        const AnimatedSelect = ({ value, onChange, options, placeholder }) => {
            const [isOpen, setIsOpen] = useState(false);
            const rootRef = useRef(null);
            const selectedOption = options.find((option) => option.value === value) || options[0];

            useEffect(() => {
                const handleOutsideClick = (event) => {
                    if (rootRef.current && !rootRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };

                document.addEventListener('mousedown', handleOutsideClick);
                return () => document.removeEventListener('mousedown', handleOutsideClick);
            }, []);

            const handleToggle = () => {
                setIsOpen((prev) => !prev);
            };

            const handleSelect = (nextValue) => {
                onChange(nextValue);
                setIsOpen(false);
            };

            return (
                <div className={`interactive-select ${isOpen ? 'open' : ''}`} ref={rootRef}>
                    <button
                        type="button"
                        className="interactive-select-trigger"
                        onClick={handleToggle}
                        aria-haspopup="listbox"
                        aria-expanded={isOpen}
                    >
                        <span className="interactive-select-text">{selectedOption?.label || placeholder}</span>
                        <span className="interactive-select-chevron" aria-hidden="true">
                            <ion-icon name="chevron-down-outline"></ion-icon>
                        </span>
                    </button>
                    <div className={`interactive-select-menu ${isOpen ? 'visible' : ''}`} role="listbox">
                        {options.map((option) => (
                            <button
                                type="button"
                                key={option.value}
                                className={`interactive-select-option ${value === option.value ? 'active' : ''}`}
                                onClick={() => handleSelect(option.value)}
                                role="option"
                                aria-selected={value === option.value}
                            >
                                <span>{option.label}</span>
                                {value === option.value && <ion-icon name="checkmark-outline"></ion-icon>}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const UploadSection = () => {

            const [isDragging, setIsDragging] = useState(false);
            const [status, setStatus] = useState('idle'); // idle, uploading, analyzing, success, error

            const [analysisError, setAnalysisError] = useState('');
            const [analysisWarning, setAnalysisWarning] = useState('');
            const [showDemoOption, setShowDemoOption] = useState(false);
            const [demoPromptMessage, setDemoPromptMessage] = useState('');
            const [reportRecognition, setReportRecognition] = useState('unknown'); // unknown, recognized, invalid
            const [emailStatus, setEmailStatus] = useState('idle'); // idle, sending, sent
            const [pdfStatus, setPdfStatus] = useState('idle'); // idle, generating, done
            const [showBookingModal, setShowBookingModal] = useState(false);
            const [isPlayingVoice, setIsPlayingVoice] = useState(false);
            const [patientName, setPatientName] = useState('');
            const [patientEmail, setPatientEmail] = useState('');
            const [patientAge, setPatientAge] = useState('');
            const [patientGender, setPatientGender] = useState('unspecified');
            const [clinicalStrictness, setClinicalStrictness] = useState('strict');
            const fileInputRef = useRef(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const genderOptions = [
                { value: 'unspecified', label: 'Prefer not to say' },
                { value: 'male', label: 'Male' },
                { value: 'female', label: 'Female' },
                { value: 'other', label: 'Other' }
            ];
            const strictnessOptions = [
                { value: 'balanced', label: 'Balanced' },
                { value: 'strict', label: 'Strict' },
                { value: 'conservative', label: 'Conservative' }
            ];

            const [isDarkTheme, setIsDarkTheme] = useState(document.documentElement.getAttribute('data-theme') === 'dark');
            useEffect(() => {
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.type === 'attributes' && mutation.attributeName === 'data-theme') {
                            setIsDarkTheme(document.documentElement.getAttribute('data-theme') === 'dark');
                        }
                    });
                });
                observer.observe(document.documentElement, { attributes: true });
                return () => observer.disconnect();
            }, []);

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') setIsDragging(true);
                else if (e.type === 'dragleave') setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) addFiles(e.dataTransfer.files);
            };

            const handleChange = (e) => {
                if (e.target.files && e.target.files[0]) addFiles(e.target.files);
            };

            const addFiles = (newFiles) => {
                const filesArr = Array.from(newFiles);
                setFiles(prev => [...prev, ...filesArr]);
                setAnalysis(null);
                setAnalysisError('');
                setAnalysisWarning('');
                setShowDemoOption(false);
                setDemoPromptMessage('');
                setReportRecognition('unknown');
            };

            const getDemoPreviewAnalysis = () => ({
                summary: 'Demo Preview: Live AI analysis is temporarily unavailable. This is a simulated report preview and not a clinical diagnosis.',
                care: ['Maintain regular sleep schedule (7-8 hours)', 'Stay hydrated (2-3 liters/day)', 'Take short breaks during intense work'],

                ],

                swot: {
                    strengths: ['No critical red flags in preview template', 'Consistent baseline wellness indicators', 'Suitable for preventive follow-up'],
                    weaknesses: ['Limited by unavailable live AI interpretation', 'No document-specific personalized findings', 'Needs clinician verification'],
                    opportunities: ['Schedule preventive check-up', 'Improve hydration and sleep routines', 'Track vitals weekly for trends'],
                    threats: ['Potential missed context without live analysis', 'Delayed specialist review risk', 'Self-interpretation without clinician guidance']
                },
                graph: [
                    { label: 'Heart Health', score: 82 },
                    { label: 'Lung Function', score: 79 },
                    { label: 'Liver Health', score: 80 },
                    { label: 'Kidney Health', score: 78 },
                    { label: 'Metabolic Balance', score: 76 }
                ]
            });

            const fileToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => {
                        const base64String = reader.result.split(',')[1];
                        resolve(base64String);
                    };
                    reader.onerror = (error) => reject(error);
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (files.length === 0) {
                    alert("Please upload a report file (PDF or Image).");
                    return;
                }

                setStatus('uploading');
                setAnalysisError('');
                setAnalysisWarning('');
                setShowDemoOption(false);
                setDemoPromptMessage('');
                setReportRecognition('unknown');
                
                try {
                    await new Promise(r => setTimeout(r, 1000));
                    
                    setStatus('analyzing');
                    
                    // Prepare multiple files if available
                    const contents = [];
                    
                    const prompt = `
                        You are an expert general physician. Analyze the provided medical report(s). 
                        Generate a comprehensive whole-body health assessment in this strict JSON format:
                        {
                            "reportValidity": {
                                "isMedicalReport": true,
                                "reason": "One short sentence explaining why it is valid/invalid"
                            },
                            "summary": "Detailed professional summary.",
                            "care": ["Step 1", "Step 2"],
                            "medicine": ["Medication Name - Dosage - Frequency - Duration (if available)"],
                            "lifestyle": ["Recommendation 1", "Recommendation 2"],
                            "swot": {
                                "strengths": ["Item 1", "Item 2", "Item 3"],
                                "weaknesses": ["Item 1", "Item 2", "Item 3"],
                                "opportunities": ["Item 1", "Item 2", "Item 3"],
                                "threats": ["Item 1", "Item 2", "Item 3"]
                            },
                            "graph": [
                                {"label": "Metric Name", "score": 80}
                            ]
                        }
                        Ensure 'graph' has exactly 5 metrics with scores 0-100 for these labels only:
                        Heart Health, Lung Function, Liver Health, Kidney Health, Metabolic Balance.
                        Scores should be age-adjusted where age clues exist.
                        IMPORTANT SWOT QUALITY RULE:
                        - Each SWOT item must be a clear point in 8-20 words.
                        - Do not use one-word or two-word fragments.
                        - Keep each item actionable and clinically meaningful.
                        If the uploaded file is not a medical report (for example food, scenery, random selfie, etc), return:
                        reportValidity.isMedicalReport=false, a clear reason, and keep other fields empty arrays/blank values.
                        Return ONLY the JSON object. No markdown.
                        IMPORTANT: Return the entire response in English.
                    `;
                    
                    contents.push({ "text": prompt });

                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const base64Data = await fileToBase64(file);
                        const mimeType = file.type || 'application/pdf';
                        contents.push({
                            "inline_data": {
                                "mime_type": mimeType,
                                "data": base64Data
                            }
                        });
                    }

                    const result = await generateWithGeminiFallback({
                        parts: contents,
                        responseMimeType: 'application/json'
                    });
                    
                    if (!result.candidates || !result.candidates[0]?.content?.parts?.[0]?.text) {
                        throw new Error("AI returned empty response. It might have been blocked due to safety content.");
                    }

                    let textResponse = result.candidates[0].content.parts[0].text;
                    
                    // Robust JSON cleanup
                    textResponse = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                    // Find actual JSON start/end in case of preamble
                    const jsonMatch = textResponse.match(/\{[\s\S]*\}/);
                    if (jsonMatch) textResponse = jsonMatch[0];
                    
                    let analysisData;
                    try {
                        analysisData = JSON.parse(textResponse);
                    } catch (e) {
                        console.error("JSON Parse Error. Raw text:", textResponse);
                        throw new Error("Failed to parse AI response. See console.");
                    }

                    const isMedicalReport = analysisData?.reportValidity?.isMedicalReport;
                    if (isMedicalReport === false) {
                        setAnalysis(null);
                        setStatus('error');
                        setAnalysisWarning('');
                        setAnalysisError(`Report not recognized: ${analysisData?.reportValidity?.reason || 'Please upload a valid medical report image or PDF.'}`);
                        setDemoPromptMessage('If you still want to explore the UI, click Show Demo Analysis.');
                        setShowDemoOption(true);
                        setReportRecognition('invalid');
                        return;
                    }

                    setAnalysis(analysisData);
                    setStatus('success');
                    setAnalysisError('');
                    setAnalysisWarning('');
                    setShowDemoOption(false);
                    setDemoPromptMessage('');
                    setReportRecognition('recognized');

                } catch (error) {
                    console.error("Upload/Analysis Error:", error);
                    if (error.message === "AI_UNAVAILABLE") {
                        setAnalysis(null);
                        setStatus('error');
                        setAnalysisWarning('');
                        setAnalysisError('Live AI analysis is currently unavailable.');
                        setDemoPromptMessage('Click Show Demo Analysis to continue with a sample report view.');
                        setShowDemoOption(true);
                        setReportRecognition('unknown');
                    } else
                    if (error.message === "QUOTA_EXCEEDED" || error.message.includes("quota") || error.message.includes("429")) {
                        setAnalysis(null);
                        setStatus('error');
                        setAnalysisWarning('');
                        setAnalysisError('Live AI analysis is rate-limited right now.');
                        setDemoPromptMessage('Click Show Demo Analysis to continue with a sample report view.');
                        setShowDemoOption(true);
                        setReportRecognition('unknown');
                    } else {

                        setStatus('error');
                        setAnalysisWarning('');
                        setAnalysisError("Analysis failed: " + error.message);
                        setShowDemoOption(false);
                        setDemoPromptMessage('');
                        setReportRecognition('unknown');
                    }
                }
            };

            const handleShowDemoAnalysis = () => {

            const recognitionMeta = {

            useEffect(() => {
                if (analysis) {

                return () => {

                        chartInstance.current.destroy();
                        chartInstance.current = null;
                    }
                };
            }, [analysis, isDarkTheme]);

            const speakText = (text) => {
                if ('speechSynthesis' in window) {
                    if (isPlayingVoice) {
                        window.speechSynthesis.cancel();
                        setIsPlayingVoice(false);
                        return;
                    }

                    setIsPlayingVoice(true);
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("Text-to-speech is not supported in your browser.");
                }
            };

            const renderList = (items) => {
                if (!items) return null;
                return items.map((item, i) => <li key={i}>{item}</li>);
            };

            const renderSwot = (items) => {
                if (!items) return null;
                return items.map((s, i) => <li key={i}>{s}</li>);
            };

            const toTitleCase = (value) => {
                const raw = String(value || '').toLowerCase();
                if (!raw) return 'Unspecified';
                return raw.charAt(0).toUpperCase() + raw.slice(1);
            };

            const parseDoseToMg = (text) => {
                const match = String(text || '').match(/(\d+(?:\.\d+)?)\s*(mcg|ug|mg|g)\b/i);
                if (!match) return null;

                const value = Number(match[1]);
                const unit = match[2].toLowerCase();
                if (!Number.isFinite(value)) return null;

                if (unit === 'g') return value * 1000;
                if (unit === 'mcg' || unit === 'ug') return value / 1000;
                return value;
            };

            const parseFrequencyPerDay = (text) => {
                const input = String(text || '').toLowerCase();

                if (/\b(once daily|once a day|\bod\b|\bqd\b)\b/.test(input)) return 1;
                if (/\b(twice daily|twice a day|\bbid\b|2\s*(x|times)\s*(a|per)?\s*day)\b/.test(input)) return 2;
                if (/\b(thrice daily|three times daily|three times a day|\btid\b|3\s*(x|times)\s*(a|per)?\s*day)\b/.test(input)) return 3;
                if (/\b(four times daily|\bqid\b|4\s*(x|times)\s*(a|per)?\s*day)\b/.test(input)) return 4;
                if (/\b(weekly|once weekly|once a week)\b/.test(input)) return 1 / 7;

                const qhMatch = input.match(/\bq\s*(\d+)\s*h\b/);
                if (qhMatch) {
                    const hours = Number(qhMatch[1]);
                    if (hours > 0) return Math.min(24, Math.max(1 / 7, 24 / hours));
                }

                const everyHourMatch = input.match(/every\s*(\d+)\s*hours?/);
                if (everyHourMatch) {
                    const hours = Number(everyHourMatch[1]);
                    if (hours > 0) return Math.min(24, Math.max(1 / 7, 24 / hours));
                }

                const explicitDailyMatch = input.match(/(\d+(?:\.\d+)?)\s*(x|times)\s*(a|per)?\s*day/);
                if (explicitDailyMatch) {
                    const times = Number(explicitDailyMatch[1]);
                    if (Number.isFinite(times) && times > 0) return Math.min(24, times);
                }

                return null;
            };

            const parseDurationDays = (text) => {
                const input = String(text || '').toLowerCase();
                const match = input.match(/(\d+(?:\.\d+)?)\s*(day|days|week|weeks|month|months|year|years)\b/);
                if (!match) return null;

                const value = Number(match[1]);
                const unit = match[2];
                if (!Number.isFinite(value)) return null;

                if (unit.startsWith('day')) return Math.round(value);
                if (unit.startsWith('week')) return Math.round(value * 7);
                if (unit.startsWith('month')) return Math.round(value * 30);
                return Math.round(value * 365);
            };

            const getRiskLabelMeta = (score, thresholds = { high: 70, medium: 40 }) => {
                if (score >= thresholds.high) {
                    return { label: 'High', color: '#991b1b', bg: '#fef2f2', border: '#fca5a5' };
                }
                if (score >= thresholds.medium) {
                    return { label: 'Medium', color: '#92400e', bg: '#fffbeb', border: '#fcd34d' };
                }
                return { label: 'Low', color: '#065f46', bg: '#ecfdf5', border: '#86efac' };
            };

            const getStrictnessConfig = (profile) => {
                if (profile === 'conservative') {
                    return {
                        profile: 'conservative',
                        baseScore: 26,
                        thresholds: { high: 60, medium: 32 },
                        agePenalty: { pediatric: 28, adolescent: 12, geriatric65: 22, geriatric75: 30 },
                        dosePenalty: { elevated: 16, moderateHigh: 26, high: 36 },
                        durationPenalty: { month: 8, quarter: 16, halfYear: 26 }
                    };
                }

                if (profile === 'balanced') {
                    return {
                        profile: 'balanced',
                        baseScore: 20,
                        thresholds: { high: 72, medium: 42 },
                        agePenalty: { pediatric: 18, adolescent: 8, geriatric65: 16, geriatric75: 22 },
                        dosePenalty: { elevated: 10, moderateHigh: 18, high: 28 },
                        durationPenalty: { month: 5, quarter: 10, halfYear: 18 }
                    };
                }

                return {
                    profile: 'strict',
                    baseScore: 24,
                    thresholds: { high: 65, medium: 36 },
                    agePenalty: { pediatric: 24, adolescent: 10, geriatric65: 20, geriatric75: 26 },
                    dosePenalty: { elevated: 14, moderateHigh: 24, high: 34 },
                    durationPenalty: { month: 7, quarter: 14, halfYear: 22 }
                };
            };

            const classifyMedicine = (rawText) => {
                const text = String(rawText || '').toLowerCase();
                if (/\b(paracetamol|acetaminophen)\b/.test(text)) return 'paracetamol';
                if (/\b(ibuprofen|diclofenac|naproxen|ketorolac|nsaid)\b/.test(text)) return 'nsaid';
                if (/\b(aspirin|warfarin|clopidogrel|heparin|rivaroxaban|apixaban|anticoagulant)\b/.test(text)) return 'anticoagulant';
                if (/\b(steroid|prednisone|prednisolone|dexamethasone|methylprednisolone)\b/.test(text)) return 'steroid';
                if (/\b(opioid|tramadol|morphine|codeine|oxycodone|fentanyl)\b/.test(text)) return 'opioid';
                if (/\b(amoxicillin|azithromycin|cef|ciprofloxacin|antibiotic)\b/.test(text)) return 'antibiotic';
                return 'general';
            };

            const getDoseCeilingMgPerDay = ({ medicineClass, age, strictness }) => {
                const isPediatric = Number.isFinite(age) && age <= 12;
                const isGeriatric = Number.isFinite(age) && age >= 65;
                const strictnessMultiplier = strictness === 'conservative' ? 0.8 : strictness === 'strict' ? 0.9 : 1;

                const baseCeilings = {
                    paracetamol: isPediatric ? 1500 : isGeriatric ? 2500 : 3000,
                    nsaid: isPediatric ? 800 : isGeriatric ? 1000 : 1200,
                    anticoagulant: isPediatric ? 120 : isGeriatric ? 100 : 150,
                    steroid: isPediatric ? 20 : isGeriatric ? 30 : 40,
                    opioid: isPediatric ? 40 : isGeriatric ? 50 : 60,
                    antibiotic: isPediatric ? 1200 : isGeriatric ? 1500 : 2000,
                    general: isPediatric ? 900 : isGeriatric ? 1200 : 1500
                };

                return Math.round((baseCeilings[medicineClass] || baseCeilings.general) * strictnessMultiplier);
            };

            const getLongTermImpact = ({ riskScore, rawText, durationDays }) => {
                const notes = [];
                const lower = String(rawText || '').toLowerCase();

                if (durationDays >= 180) {
                    notes.push('Extended duration may increase cumulative side-effect burden and organ stress.');
                } else if (durationDays >= 90) {
                    notes.push('Sustained use warrants periodic clinical monitoring and laboratory follow-up.');
                } else if (durationDays >= 30) {
                    notes.push('Monthly use pattern should be reviewed to prevent avoidable long-term exposure.');
                }

                if (/\b(steroid|prednisone|dexamethasone)\b/.test(lower)) {
                    notes.push('Long-term steroid exposure may affect bone density, glucose control, and immunity.');
                }
                if (/\b(ibuprofen|diclofenac|naproxen|nsaid)\b/.test(lower)) {
                    notes.push('Chronic NSAID use can elevate kidney and gastrointestinal risk in vulnerable patients.');
                }
                if (/\b(aspirin|warfarin|clopidogrel|anticoagulant)\b/.test(lower)) {
                    notes.push('Extended blood-thinner therapy requires regular bleeding-risk review and dose checks.');
                }
                if (/\b(opioid|tramadol|morphine|codeine)\b/.test(lower)) {
                    notes.push('Prolonged opioid use may increase dependence risk and reduce functional resilience.');
                }

                if (riskScore >= 70) {
                    notes.push('High-risk profile: schedule earlier physician review and tighter monitoring intervals.');
                } else if (riskScore >= 40) {
                    notes.push('Moderate-risk profile: maintain follow-up cadence and monitor symptoms closely.');
                } else {
                    notes.push('Low-risk profile: continue routine monitoring and reassess if symptoms evolve.');
                }

                return notes.slice(0, 3);
            };

            const buildDosageVerification = (medicineItems, ageInput, genderInput, strictnessInput) => {
                const meds = Array.isArray(medicineItems) ? medicineItems.filter(Boolean) : [];
                const age = Number(ageInput);
                const hasAge = Number.isFinite(age) && age > 0;
                const gender = String(genderInput || 'unspecified').toLowerCase();
                const normalizedGender = ['male', 'female', 'other'].includes(gender) ? gender : 'unspecified';
                const strictnessConfig = getStrictnessConfig(strictnessInput);

                if (!meds.length) {
                    return {
                        age: hasAge ? age : null,
                        gender: normalizedGender,
                        strictnessProfile: strictnessConfig.profile,
                        overallRiskScore: 18,
                        overallRiskLevel: 'Low',
                        riskFactors: ['No medication entries found in the report.'],
                        longTermImpact: ['Cannot estimate long-term medication impact without dosage/frequency entries.'],
                        items: []
                    };
                }

                const commonRiskFactors = new Set();

                const items = meds.map((medText) => {
                    const doseMg = parseDoseToMg(medText);
                    const frequencyPerDay = parseFrequencyPerDay(medText);
                    const durationDays = parseDurationDays(medText);
                    const dailyDoseMg = doseMg && frequencyPerDay ? Math.round(doseMg * frequencyPerDay) : null;
                    const medicineClass = classifyMedicine(medText);
                    const doseCeilingMgPerDay = getDoseCeilingMgPerDay({
                        medicineClass,
                        age: hasAge ? age : null,
                        strictness: strictnessConfig.profile
                    });

                    let score = strictnessConfig.baseScore;
                    const factors = [];

                    if (dailyDoseMg !== null) {
                        if (dailyDoseMg > (doseCeilingMgPerDay * 1.5)) {
                            score += strictnessConfig.dosePenalty.high + 10;
                            factors.push(`Dose exceeds class ceiling significantly (${dailyDoseMg} mg/day vs ${doseCeilingMgPerDay} mg/day).`);
                            commonRiskFactors.add('One or more medicines exceed class-specific daily dose ceiling.');
                        } else if (dailyDoseMg > doseCeilingMgPerDay) {
                            score += strictnessConfig.dosePenalty.high;
                            factors.push(`Dose exceeds class ceiling (${dailyDoseMg} mg/day vs ${doseCeilingMgPerDay} mg/day).`);
                            commonRiskFactors.add('Dose is above medicine-class recommended ceiling.');
                        } else if (dailyDoseMg > 2000) {
                            score += strictnessConfig.dosePenalty.high;
                            factors.push(`High daily exposure (${dailyDoseMg} mg/day).`);
                            commonRiskFactors.add('High daily medication exposure detected.');
                        } else if (dailyDoseMg > 1000) {
                            score += strictnessConfig.dosePenalty.moderateHigh;
                            factors.push(`Moderately high daily exposure (${dailyDoseMg} mg/day).`);
                            commonRiskFactors.add('Moderately high daily medication exposure detected.');
                        } else if (dailyDoseMg > 500) {
                            score += strictnessConfig.dosePenalty.elevated;
                            factors.push(`Elevated daily exposure (${dailyDoseMg} mg/day).`);
                        }
                    } else {
                        score += 8;
                        factors.push('Incomplete dose/frequency details reduce verification confidence.');
                        commonRiskFactors.add('Some medicines lack complete dosage details.');
                    }

                    if (hasAge) {
                        if (age >= 75) {
                            score += strictnessConfig.agePenalty.geriatric75;
                            factors.push('Very high age-related sensitivity to adverse effects (75+).');
                            commonRiskFactors.add('Age 75+ requires strict dose review and frequent monitoring.');
                        } else if (age >= 65) {
                            score += strictnessConfig.agePenalty.geriatric65;
                            factors.push('Age-related sensitivity to adverse effects (65+).');
                            commonRiskFactors.add('Age 65+ needs closer dose tolerance monitoring.');
                        } else if (age <= 12) {
                            score += strictnessConfig.agePenalty.pediatric;
                            factors.push('Pediatric dosing requires strict weight/age verification.');
                            commonRiskFactors.add('Pediatric age group increases dosing sensitivity.');
                        } else if (age <= 17) {
                            score += strictnessConfig.agePenalty.adolescent;
                            factors.push('Adolescent dosing should be confirmed for growth-stage safety.');
                        }
                    } else {
                        factors.push('Age not provided, so age-adjusted verification is limited.');
                        commonRiskFactors.add('Age data missing for full dose verification.');
                    }

                    if (normalizedGender === 'female' && dailyDoseMg !== null && dailyDoseMg > 1000) {
                        score += 4;
                        factors.push('Additional review advised for higher-dose female-specific tolerability differences.');
                    }

                    if (durationDays !== null) {
                        if (durationDays >= 180) {
                            score += strictnessConfig.durationPenalty.halfYear;
                            factors.push('Long-term planned use (>= 6 months).');
                            commonRiskFactors.add('Long-term therapy duration raises cumulative risk.');
                        } else if (durationDays >= 90) {
                            score += strictnessConfig.durationPenalty.quarter;
                            factors.push('Extended use (>= 3 months).');
                            commonRiskFactors.add('Extended therapy duration requires periodic review.');
                        } else if (durationDays >= 30) {
                            score += strictnessConfig.durationPenalty.month;
                            factors.push('Monthly use duration should be reviewed with clinician.');
                        }
                    } else {
                        commonRiskFactors.add('Duration missing for one or more medicines.');
                    }

                    const rawLower = String(medText || '').toLowerCase();
                    if (/\b(steroid|prednisone|dexamethasone)\b/.test(rawLower)) {
                        score += 14;
                        factors.push('Steroid class requires tighter long-term metabolic and bone monitoring.');
                    }
                    if (/\b(ibuprofen|diclofenac|naproxen|nsaid)\b/.test(rawLower)) {
                        score += 10;
                        factors.push('NSAID class may increase kidney and gastric risk over time.');
                    }
                    if (/\b(opioid|tramadol|morphine|codeine)\b/.test(rawLower)) {
                        score += 18;
                        factors.push('Opioid-class medicines carry dependence and tolerance risk.');
                    }

                    const boundedScore = Math.max(0, Math.min(100, Math.round(score)));
                    const levelMeta = getRiskLabelMeta(boundedScore, strictnessConfig.thresholds);

                    return {
                        medicine: medText,
                        medicineClass,
                        parsed: {
                            doseMg,
                            frequencyPerDay,
                            durationDays,
                            dailyDoseMg,
                            doseCeilingMgPerDay
                        },
                        riskScore: boundedScore,
                        riskLevel: levelMeta.label,
                        riskFactors: factors.slice(0, 3),
                        longTermImpact: getLongTermImpact({
                            riskScore: boundedScore,
                            rawText: medText,
                            durationDays: durationDays || 0
                        })
                    };
                });

                if (items.length >= 4) {
                    commonRiskFactors.add('Polypharmacy pattern detected (4+ medications).');
                }

                const overallRiskScore = Math.round(items.reduce((sum, item) => sum + item.riskScore, 0) / items.length);
                const overallMeta = getRiskLabelMeta(overallRiskScore, strictnessConfig.thresholds);
                const longTermImpact = Array.from(new Set(items.flatMap((item) => item.longTermImpact))).slice(0, 4);

                return {
                    age: hasAge ? age : null,
                    gender: normalizedGender,
                    strictnessProfile: strictnessConfig.profile,
                    overallRiskScore,
                    overallRiskLevel: overallMeta.label,
                    riskFactors: Array.from(commonRiskFactors).slice(0, 5),
                    longTermImpact,
                    items
                };
            };

            const getRelevantHealthGraph = (rawGraph) => {
                const fallbackScores = [84, 79, 82, 78, 76];
                const source = Array.isArray(rawGraph) ? rawGraph : [];

                const normalizeMetricLabel = (value) => {
                    return String(value || '')
                        .toLowerCase()
                        .replace(/[^a-z]+/g, ' ')
                        .trim();
                };

                const parseScore = (value) => {
                    if (typeof value === 'number' && Number.isFinite(value)) {
                        return value;
                    }

                    const textValue = String(value ?? '').trim();
                    if (!textValue) {
                        return null;
                    }

                    const numericMatch = textValue.match(/-?\d+(?:\.\d+)?/);
                    if (!numericMatch) {
                        return null;
                    }

                    const parsed = Number(numericMatch[0]);
                    return Number.isFinite(parsed) ? parsed : null;
                };

                const scoreByLabel = new Map();
                source.forEach((item) => {
                    const normalizedLabel = normalizeMetricLabel(item?.label);
                    if (!normalizedLabel) return;

                    const parsedScore = parseScore(item?.score);
                    if (parsedScore === null) return;

                    scoreByLabel.set(normalizedLabel, parsedScore);
                });

                return HEALTH_METRIC_LABELS.map((label, index) => {
                    const score = scoreByLabel.get(normalizeMetricLabel(label));
                    return {
                        label,
                        score: Number.isFinite(score) ? Math.max(0, Math.min(100, Math.round(score))) : fallbackScores[index]
                    };
                });
            };

            const healthGraphData = getRelevantHealthGraph(analysis?.graph);
            const overallHealthScore = Math.round(healthGraphData.reduce((sum, item) => sum + item.score, 0) / healthGraphData.length);
            const riskMeta = overallHealthScore >= 80
                ? { label: 'Low Risk', color: '#065f46', bg: '#ecfdf5', border: '#86efac' }
                : overallHealthScore >= 60
                    ? { label: 'Moderate Risk', color: '#92400e', bg: '#fffbeb', border: '#fcd34d' }
                    : { label: 'High Risk', color: '#991b1b', bg: '#fef2f2', border: '#fca5a5' };
            const sortedMetrics = [...healthGraphData].sort((a, b) => b.score - a.score);
            const topStrength = sortedMetrics[0];
            const focusArea = sortedMetrics[sortedMetrics.length - 1];
            const dosageVerification = buildDosageVerification(analysis?.medicine, patientAge, patientGender, clinicalStrictness);
            const dosageThresholds = getStrictnessConfig(clinicalStrictness).thresholds;
            const dosageRiskMeta = getRiskLabelMeta(dosageVerification.overallRiskScore, dosageThresholds);

            const getReportPayload = () => {
                return {
                    patientName: patientName.trim() || 'Patient',
                    patientAge: Number.isFinite(Number(patientAge)) ? Number(patientAge) : null,
                    patientGender,
                    clinicalStrictness,
                    analysis: {
                        summary: analysis?.summary,
                        care: analysis?.care,
                        medicine: analysis?.medicine,
                        lifestyle: analysis?.lifestyle,
                        swot: analysis?.swot,
                        graph: healthGraphData,
                        dosageVerification
                    }
                };
            };

            const handleEmailReport = async () => {
                if (emailStatus === 'sending') {
                    return;
                }

                const email = patientEmail.trim();
                if (!email) {
                    alert("Please enter an email address above to send the report.");
                    return;
                }

                if (!analysis) {
                    alert("No analysis data found. Please run analysis first.");
                    return;
                }

                setEmailStatus('sending');
                try {
                    const reportPayload = getReportPayload();
                    const response = await fetch('/api/report/email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            to: email,
                            ...reportPayload
                        })
                    });

                    const raw = await response.text();
                    let payload = {};
                    try {
                        payload = raw ? JSON.parse(raw) : {};
                    } catch (_error) {
                        payload = {};
                    }

                    if (!response.ok) {
                        throw new Error(payload?.error?.message || 'Unable to send email report right now.');
                    }

                    setEmailStatus('sent');
                    setTimeout(() => setEmailStatus('idle'), 3000);
                    alert(`Report emailed successfully to ${email}.`);
                } catch (error) {
                    setEmailStatus('idle');
                    alert(`Failed to send email report: ${error.message}`);
                }
            };

            const handleDownloadPdf = async () => {
                if (!analysis) {
                    alert("No analysis data found. Please run analysis first.");
                    return;
                }

                setPdfStatus('generating');
                try {
                    const reportPayload = getReportPayload();
                    const response = await fetch('/api/report/pdf', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(reportPayload)
                    });

                    if (!response.ok) {
                        const payload = await response.json().catch(() => ({}));
                        throw new Error(payload?.error?.message || 'Unable to generate PDF right now.');
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `NeuCyn_Report_${Date.now()}.pdf`;
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    window.URL.revokeObjectURL(url);

                    setPdfStatus('done');
                    setTimeout(() => setPdfStatus('idle'), 3000);
                } catch (error) {
                    setPdfStatus('idle');
                    alert(`Failed to download PDF: ${error.message}`);
                }
            };

            return (
                <section id="upload" className="upload-section">
                    <div className="container">
                        <div className="section-header fade-up">
                            <h2>Secure Upload</h2>
                            <p>Upload your reports for instant AI-powered analysis.</p>
                        </div>
                        <div className="glass-panel fade-up">
                            <form id="uploadForm" onSubmit={handleSubmit}>
                                <div className="input-grid">
                                    <div className="input-group">
                                        <label>Full Name</label>
                                        <input
                                            type="text"
                                            placeholder="John Doe"
                                            value={patientName}
                                            onChange={(e) => setPatientName(e.target.value)}
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label>Email Address</label>
                                        <input
                                            type="email"
                                            id="userEmail"
                                            placeholder="john@example.com"
                                            value={patientEmail}
                                            onChange={(e) => setPatientEmail(e.target.value)}
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label>Age</label>
                                        <input
                                            type="number"
                                            min="0"
                                            max="120"
                                            placeholder="35"
                                            value={patientAge}
                                            onChange={(e) => setPatientAge(e.target.value)}
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label>Gender</label>
                                        <AnimatedSelect
                                            value={patientGender}
                                            onChange={setPatientGender}
                                            options={genderOptions}
                                            placeholder="Select gender"
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label>Clinical Strictness</label>
                                        <AnimatedSelect
                                            value={clinicalStrictness}
                                            onChange={setClinicalStrictness}
                                            options={strictnessOptions}
                                            placeholder="Select strictness"
                                        />
                                    </div>
                                </div>
                                <div 
                                    className={`drop-zone ${isDragging ? 'dragover' : ''}`}
                                    onDragEnter={handleDrag} onDragLeave={handleDrag} onDragOver={handleDrag} onDrop={handleDrop}
                                    onClick={() => fileInputRef.current.click()}
                                >
                                    <div className="upload-icon">
                                        {status === 'analyzing' ? <div className="spinner"><ion-icon name="sync-outline" className="spin"></ion-icon></div> : <ion-icon name="cloud-upload-outline" style={{fontSize: '48px'}}></ion-icon>}
                                    </div>
                                    <span className="drop-title">
                                        {files.length > 0 ? `${files.length} file(s) selected` : "Click or Drag files to upload"}
                                    </span>
                                    <input type="file" ref={fileInputRef} style={{display: 'none'}} accept=".pdf,.jpg,.jpeg,.png" multiple onChange={handleChange} />
                                </div>
                                <div className="file-list">
                                    {files.map((f, i) => (
                                        <div key={i} className="file-row">
                                            <span>{f.name}</span>
                                            <span style={{fontSize: '12px', color: 'var(--text-secondary)'}}>{(f.size/1024/1024).toFixed(2)} MB</span>
                                        </div>

                                </div>
                                {files.length > 0 && (
                                    <div style={{
                                        marginTop: '10px',

                                        border: `1px solid ${recognitionMeta[reportRecognition].border}`,
                                        background: recognitionMeta[reportRecognition].bg,
                                        color: recognitionMeta[reportRecognition].color,
                                        fontSize: '12px',
                                        fontWeight: 700,
                                        display: 'inline-flex',
                                        alignItems: 'center',
                                        gap: '8px'

                                        <ion-icon name={reportRecognition === 'recognized' ? 'checkmark-circle-outline' : reportRecognition === 'invalid' ? 'alert-circle-outline' : 'time-outline'}></ion-icon>
                                        <span>{recognitionMeta[reportRecognition].text}</span>
                                    </div>
                                )}
                                <button type="submit" className="btn btn-primary btn-block" disabled={status === 'uploading' || status === 'analyzing'}>
                                    {status === 'uploading' ? "Uploading..." : status === 'analyzing' ? "Analyzing via Neuro-AI..." : "Analyze Report"}
                                </button>
                                {status === 'error' && analysisError && (
                                    <p style={{marginTop: '12px', fontSize: '14px', color: '#dc2626', fontWeight: 600}}>{analysisError}</p>
                                )}
                                {showDemoOption && (
                                    <div style={{marginTop: '12px', display: 'flex', flexDirection: 'column', gap: '10px'}}>
                                        <p style={{margin: 0, fontSize: '13px', color: '#b45309', fontWeight: 600}}>{demoPromptMessage}</p>
                                        <button type="button" className="btn btn-primary" onClick={handleShowDemoAnalysis}>
                                            Show Demo Analysis
                                        </button>
                                    </div>
                                )}
                            </form>

                            {status === 'analyzing' && <SkeletonLoader />}

                            {analysis && (
                                <div className="analysis-results fade-up">
                                    <div className="result-header" style={{textAlign: 'center', marginBottom: '30px'}}>
                                        <h2 style={{color: 'var(--accent)'}}>Analysis Complete</h2>
                                        <div style={{display: 'inline-flex', alignItems: 'center', gap: '8px', margin: '8px auto 14px auto', padding: '8px 14px', borderRadius: '999px', border: `1px solid ${riskMeta.border}`, background: riskMeta.bg, color: riskMeta.color, fontSize: '13px', fontWeight: 700}}>
                                            <ion-icon name="shield-checkmark-outline"></ion-icon>
                                            <span>{riskMeta.label} • {overallHealthScore}/100</span>
                                        </div>
                                        {analysisWarning && (
                                            <p style={{maxWidth: '720px', margin: '0 auto 12px auto', color: '#b45309', background: '#fffbeb', border: '1px solid #fbbf24', padding: '10px 14px', borderRadius: '10px', fontSize: '14px', fontWeight: 600}}>{analysisWarning}</p>
                                        )}

                                                <div style={{fontSize: '14px', color: '#0f172a', fontWeight: 700, marginTop: '2px'}}>{overallHealthScore}/100</div>
                                            </div>
                                            <div style={{background: '#ecfdf5', border: '1px solid #86efac', borderRadius: '10px', padding: '10px 12px', textAlign: 'left'}}>

                                                <div style={{fontSize: '14px', color: '#0f172a', fontWeight: 700, marginTop: '2px'}}>{topStrength.label} ({topStrength.score})</div>
                                            </div>
                                            <div style={{background: '#fffbeb', border: '1px solid #fcd34d', borderRadius: '10px', padding: '10px 12px', textAlign: 'left'}}>
                                                <div style={{fontSize: '11px', color: '#92400e', fontWeight: 700}}>Focus Area</div>
                                                <div style={{fontSize: '14px', color: '#0f172a', fontWeight: 700, marginTop: '2px'}}>{focusArea.label} ({focusArea.score})</div>
                                            </div>
                                            <div style={{background: dosageRiskMeta.bg, border: `1px solid ${dosageRiskMeta.border}`, borderRadius: '10px', padding: '10px 12px', textAlign: 'left'}}>
                                                <div style={{fontSize: '11px', color: dosageRiskMeta.color, fontWeight: 700}}>Dosage Risk</div>
                                                <div style={{fontSize: '14px', color: '#0f172a', fontWeight: 700, marginTop: '2px'}}>{dosageVerification.overallRiskLevel} ({dosageVerification.overallRiskScore}/100)</div>
                                            </div>
                                        </div>
                                        <div className="analysis-actions" style={{display: 'flex', justifyContent: 'center', gap: '12px', marginTop: '20px', flexWrap: 'wrap'}}>
                                            <button className={`analysis-action-btn voice-btn ${isPlayingVoice ? 'playing' : ''}`} onClick={() => speakText(analysis.summary)}>
                                                <ion-icon name={isPlayingVoice ? "volume-high-outline" : "volume-medium-outline"}></ion-icon>
                                                {isPlayingVoice ? "Stop Reading" : "Read Aloud"}
                                            </button>
                                            <button className="analysis-action-btn action-email-btn" onClick={handleEmailReport} disabled={emailStatus === 'sending'}>
                                                {emailStatus === 'sending' ? (
                                                    <>Sending <ion-icon name="sync-outline" className="spin"></ion-icon></>
                                                ) : emailStatus === 'sent' ? (
                                                    <>Sent Successfully <ion-icon name="checkmark-circle-outline"></ion-icon></>
                                                ) : (
                                                    <>Email Report <ion-icon name="mail-outline"></ion-icon></>
                                                )}
                                            </button>
                                            <button className="analysis-action-btn" onClick={handleDownloadPdf}>
                                                {pdfStatus === 'generating' ? (
                                                    <>Generating <ion-icon name="sync-outline" className="spin"></ion-icon></>
                                                ) : pdfStatus === 'done' ? (
                                                    <>Downloaded <ion-icon name="checkmark-circle-outline"></ion-icon></>
                                                ) : (
                                                    <>Download PDF <ion-icon name="download-outline"></ion-icon></>
                                                )}
                                            </button>
                                            {analysis.swot?.threats?.length > 0 && (
                                                <button className="analysis-action-btn action-consult-btn" onClick={() => setShowBookingModal(true)}>
                                                    Consult Doctor <ion-icon name="calendar-outline"></ion-icon>
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    <div className="result-grid">
                                        <div className="result-card" style={{gridColumn: '1 / -1', minHeight: '400px', position: 'relative', overflow: 'hidden'}}>
                                            <NeuralBackground type="molecular" />
                                            <div className="metric-card-header" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '12px', marginBottom: '16px', position: 'relative', zIndex: 2}}>
                                                <h3 style={{marginBottom: 0, flex: '1 1 280px', minWidth: 0}}><ion-icon name="pulse-outline" style={{color: 'var(--accent)'}}></ion-icon> Overall Health Radar</h3>
                                                <div className="metric-score-pill" style={{fontSize: '13px', color: 'var(--text-secondary)', background: 'var(--bg-card)', padding: '4px 12px', borderRadius: '20px', border: '1px solid var(--border)', maxWidth: '100%'}}>
                                                    Overall Health Score: <span style={{color: 'var(--accent)', fontWeight: 'bold'}}>{overallHealthScore}/100</span>
                                                </div>
                                            </div>
                                            <div className="health-graph" style={{position: 'relative', height: '350px', width: '100%', display: 'flex', justifyContent: 'center', zIndex: 2}}>
                                                <canvas ref={chartRef} style={{maxWidth: '600px', margin: '0 auto'}}></canvas>
                                            </div>
                                        </div>

                                        <div className="result-card" style={{gridColumn: '1 / -1'}}>
                                            <h3><ion-icon name="analytics-outline"></ion-icon> Comprehensive SWOT Analysis</h3>
                                            <div className="swot-grid">
                                                <div className="swot-box strengths">
                                                    <div className="swot-header">
                                                        <div className="swot-icon"><ion-icon name="shield-checkmark-outline"></ion-icon></div>
                                                        <h4>Strengths</h4>
                                                    </div>
                                                    <ul>{renderSwot(analysis.swot && analysis.swot.strengths)}</ul>
                                                </div>
                                                <div className="swot-box weaknesses">
                                                    <div className="swot-header">
                                                        <div className="swot-icon"><ion-icon name="alert-circle-outline"></ion-icon></div>
                                                        <h4>Weaknesses</h4>
                                                    </div>
                                                    <ul>{renderSwot(analysis.swot && analysis.swot.weaknesses)}</ul>
                                                </div>
                                                <div className="swot-box opportunities">
                                                    <div className="swot-header">
                                                        <div className="swot-icon"><ion-icon name="bulb-outline"></ion-icon></div>
                                                        <h4>Opportunities</h4>
                                                    </div>
                                                    <ul>{renderSwot(analysis.swot && analysis.swot.opportunities)}</ul>
                                                </div>
                                                <div className="swot-box threats">
                                                    <div className="swot-header">
                                                        <div className="swot-icon"><ion-icon name="warning-outline"></ion-icon></div>
                                                        <h4>Threats</h4>
                                                    </div>
                                                    <ul>{renderSwot(analysis.swot && analysis.swot.threats)}</ul>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="result-card" style={{gridColumn: '1 / -1'}}>
                                            <h3><ion-icon name="shield-half-outline"></ion-icon> Dosage Verification</h3>
                                            <div style={{display: 'flex', flexWrap: 'wrap', gap: '10px', marginBottom: '12px'}}>
                                                <div style={{padding: '8px 12px', borderRadius: '999px', border: `1px solid ${dosageRiskMeta.border}`, background: dosageRiskMeta.bg, color: dosageRiskMeta.color, fontSize: '12px', fontWeight: 700}}>
                                                    Risk Level: {dosageVerification.overallRiskLevel}
                                                </div>
                                                <div style={{padding: '8px 12px', borderRadius: '999px', border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-primary)', fontSize: '12px', fontWeight: 700}}>
                                                    Risk Score: {dosageVerification.overallRiskScore}/100
                                                </div>
                                                <div style={{padding: '8px 12px', borderRadius: '999px', border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-primary)', fontSize: '12px', fontWeight: 700}}>
                                                    Age: {dosageVerification.age ?? 'Not Provided'}
                                                </div>
                                                <div style={{padding: '8px 12px', borderRadius: '999px', border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-primary)', fontSize: '12px', fontWeight: 700}}>
                                                    Gender: {toTitleCase(dosageVerification.gender)}
                                                </div>
                                                <div style={{padding: '8px 12px', borderRadius: '999px', border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-primary)', fontSize: '12px', fontWeight: 700}}>
                                                    Strictness: {toTitleCase(dosageVerification.strictnessProfile || clinicalStrictness)}
                                                </div>
                                            </div>

                                            <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '10px', marginBottom: '14px'}}>
                                                <div style={{background: '#f8fafc', border: '1px solid #dbeafe', borderRadius: '12px', padding: '12px'}}>
                                                    <h4 style={{fontSize: '13px', margin: '0 0 8px 0', color: '#1e3a8a'}}>Risk Factors</h4>
                                                    <ul style={{margin: 0, paddingLeft: '18px', color: 'var(--text-secondary)', fontSize: '13px'}}>
                                                        {dosageVerification.riskFactors.length > 0
                                                            ? dosageVerification.riskFactors.map((factor, idx) => <li key={idx}>{factor}</li>)
                                                            : <li>No major dosage risk factors found.</li>}
                                                    </ul>
                                                </div>
                                                <div style={{background: '#f8fafc', border: '1px solid #fde68a', borderRadius: '12px', padding: '12px'}}>
                                                    <h4 style={{fontSize: '13px', margin: '0 0 8px 0', color: '#92400e'}}>Long-Term Impact</h4>
                                                    <ul style={{margin: 0, paddingLeft: '18px', color: 'var(--text-secondary)', fontSize: '13px'}}>
                                                        {dosageVerification.longTermImpact.length > 0
                                                            ? dosageVerification.longTermImpact.map((impact, idx) => <li key={idx}>{impact}</li>)
                                                            : <li>Insufficient data for long-term medication impact assessment.</li>}
                                                    </ul>
                                                </div>
                                            </div>
