        const HealthTips = () => {
            const cards = [
                { icon: "water-outline", title: "Cognitive Clarity", desc: "Hydration is key. Even 1% dehydration decreases cognitive function and focus.", url: "https://www.cdc.gov/healthy-weight-growth/water-healthy-drinks/index.html" },
                { icon: "moon-outline", title: "Deep Sleep Architecture", desc: "Protect your REM cycles. This is when your brain consolidates memory and clears toxins.", url: "https://www.nhlbi.nih.gov/health/sleep/stages-of-sleep" },
                { icon: "extension-puzzle-outline", title: "Neuroplasticity", desc: "Learn something new daily to form new neural pathways and keep your brain agile.", url: "https://www.health.harvard.edu/mind-and-mood/tips-to-support-brain-health" },
                { icon: "leaf-outline", title: "Brain Foods", desc: "Omega-3s and antioxidants in berries reduce oxidative stress in neural networks.", url: "https://www.health.harvard.edu/mind-and-mood/foods-linked-to-better-brainpower" },
                { icon: "pulse-outline", title: "Stress Management", desc: "Chronic stress shrinks the hippocampus. Practice mindfulness to protect memory.", url: "https://www.nimh.nih.gov/health/topics/caring-for-your-mental-health" },
                { icon: "sunny-outline", title: "Morning Light", desc: "Exposure to sunlight resets your circadian rhythm for better sleep-wake cycles.", url: "https://www.sleepfoundation.org/circadian-rhythm" }
            ];

            // Duplicated for infinite loop
            const carouselItems = [...cards, ...cards];
            const sliderRef = useRef(null);
            const [isDown, setIsDown] = useState(false);
            const [startX, setStartX] = useState(0);
            const [scrollLeft, setScrollLeft] = useState(0);
            const [isPaused, setIsPaused] = useState(false);

            useEffect(() => {
                const slider = sliderRef.current;
                let animationId;
                
                const animate = () => {
                    if (!isDown && !isPaused && slider) {
                        slider.scrollLeft += 1;
                        // Seamless loop reset
                        if (slider.scrollLeft >= slider.scrollWidth / 2) {
                            slider.scrollLeft = 0;
                        }
                    }
                    animationId = requestAnimationFrame(animate);
                };
                animationId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationId);
            }, [isDown, isPaused]);

            const handleMouseDown = (e) => {
                setIsDown(true);
                setStartX(e.pageX - sliderRef.current.offsetLeft);
                setScrollLeft(sliderRef.current.scrollLeft);
            };

            const handleMouseLeave = () => {
                setIsDown(false);
                setIsPaused(false);
            };

            const handleMouseUp = () => {
                setIsDown(false);
            };

            const handleMouseMove = (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - sliderRef.current.offsetLeft;
                const walk = (x - startX) * 2; 
                sliderRef.current.scrollLeft = scrollLeft - walk;
            };

            return (
                <section className="health-tips-section fade-up">
                    <div className="health-header">
                        <h2>Daily Health Insights</h2>
                        <p style={{fontSize: '19px', color: 'var(--text-secondary)'}}>Drag to explore or watch our expert curated tips.</p>
                    </div>
                    
                    <div 
                        className="tips-carousel-wrapper"
                        ref={sliderRef}
                        onMouseDown={handleMouseDown}
                        onMouseLeave={handleMouseLeave}
                        onMouseUp={handleMouseUp}
                        onMouseMove={handleMouseMove}
                        onMouseEnter={() => setIsPaused(true)}
                    >
                        <div className="tips-track">
                            {carouselItems.map((card, i) => (
                                <div key={i} className="health-card">
                                    <div className="card-number">{String((i % cards.length) + 1).padStart(2, '0')}</div>
                                    <div>
                                        <div className="card-icon-wrapper">
                                            <ion-icon name={card.icon}></ion-icon>
                                        </div>
                                        <div className="card-content">
                                            <h3>{card.title}</h3>
                                            <p>{card.desc}</p>
                                        </div>
                                    </div>
                                    <div className="card-footer">
                                        <a href={card.url} target="_blank" rel="noopener noreferrer" className="card-action" aria-label={`Read more about ${card.title}`}>
                                            Read More <ion-icon name="arrow-forward-outline"></ion-icon>
                                        </a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ComplianceSection = () => {
            return (
                <section id="security" className="compliance-section">
                    <div className="container">
                        <div className="compliance-wrapper fade-up">
                            <div className="compliance-headers">
                                <h2>Enterprise-Grade Security & Standards</h2>
                                <p>We adhere to the strictest global standards to protect your sensitive medical data.</p>
                            </div>
                            <div className="badges-grid">
                                <div className="badge-item">
                                    <div className="badge-icon"><ion-icon name="shield-checkmark-outline"></ion-icon></div>
                                    <div className="badge-content">
                                        <span>ISO 27001</span>
                                        <small>Information Security</small>
                                    </div>
                                </div>
                                <div className="badge-item">
                                    <div className="badge-icon"><ion-icon name="lock-closed-outline"></ion-icon></div>
                                    <div className="badge-content">
                                        <span>HIPAA</span>
                                        <small>Compliant Processing</small>
                                    </div>
                                </div>
                                <div className="badge-item">
                                    <div className="badge-icon"><ion-icon name="globe-outline"></ion-icon></div>
                                    <div className="badge-content">
                                        <span>GDPR</span>
                                        <small>Data Protection</small>
                                    </div>
                                </div>
                                <div className="badge-item">
                                    <div className="badge-icon"><ion-icon name="server-outline"></ion-icon></div>
                                    <div className="badge-content">
                                        <span>SOC 2 Type II</span>
                                        <small>Audited Security</small>
                                    </div>
                                </div>
                                <div className="badge-item">
                                    <div className="badge-icon"><ion-icon name="key-outline"></ion-icon></div>
                                    <div className="badge-content">
                                        <span>AES-256</span>
                                        <small>E2E Encryption</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer id="contact">
                <div className="container footer-content">
                    <div>© 2026 NeuCyn. All rights reserved.</div>
                    <div className="footer-links"><a href="#">Privacy</a><a href="#">Terms</a></div>
                </div>
                <div className="copyright-flowy">
                    <span className="copyright-text">© Designed & Built by Atharv Shukla</span>
                </div>
            </footer>
        );

        const ScrollTopButton = () => {
            const [visible, setVisible] = useState(false);

            useEffect(() => {
                const onScroll = () => {
                    setVisible(window.scrollY > 320);
                };

                window.addEventListener('scroll', onScroll, { passive: true });
                onScroll();
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <button
                    type="button"
                    className={`scroll-top-btn ${visible ? 'show' : ''}`}
                    onClick={scrollToTop}
                    aria-label="Go to top"
                    title="Go to top"
                >
                    <ion-icon name="arrow-up-outline"></ion-icon>
                </button>
            );
        };

        const App = () => {
            const [isDark, setIsDark] = useState(false);

            useEffect(() => {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    setIsDark(true);
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            }, []);

            const toggleTheme = () => {
                const newTheme = !isDark;
                setIsDark(newTheme);
                document.documentElement.setAttribute('data-theme', newTheme ? 'dark' : 'light');
                localStorage.setItem('theme', newTheme ? 'dark' : 'light');
            };

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('visible'));
                }, { threshold: 0.1 });
                setTimeout(() => document.querySelectorAll('.fade-up').forEach(el => observer.observe(el)), 100);
                return () => observer.disconnect();
            }, []);

            return (
                <React.Fragment>
                    <Navbar toggleTheme={toggleTheme} isDark={isDark} />
                    <Hero />
                    <StatsStrip />
                    <HealthTips />
                    <Features />
                    <ProcessWorkflow />
                    <UploadSection />
                    <ComplianceSection />
                    <Footer />
                    <ScrollTopButton />
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
